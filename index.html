<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#378ADD" />
    <meta name="description" content="FinTrack — acompanhe receitas, despesas, planos e orçamento. Local-first." />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA hints -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FinTrack" />

    <!-- Android PWA hints -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FinTrack" />

    <title>FinTrack — Controle Financeiro</title>

    <!-- Bootstrap dark class before render so the page never flashes light. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('fintrack:theme');
          var pref = 'system';
          if (raw) pref = (JSON.parse(raw).state || {}).preference || 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
